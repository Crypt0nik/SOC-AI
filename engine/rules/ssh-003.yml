title: SSH Login from External IP
id: ssh-003-sigma
status: stable
description: >
  Detects a successful SSH authentication originating from a public
  (non-RFC1918) IP address, which may indicate unauthorized remote access
  or compromised credentials (MITRE ATT&CK T1078 — Valid Accounts).
  Note: 172.x filtering covers the 172.16-172.31 range; 172.0-172.15 and
  172.32-172.255 are public and will not be filtered.
author: SOC-AI
date: 2026/06/29
logsource:
  category: authentication
  product: linux
detection:
  selection:
    action: ssh_accepted_auth
  filter:
    source_ip|startswith:
      - '10.'
      - '192.168.'
      - '172.'
      - '127.'
  condition: selection and not filter
level: medium
falsepositives:
  - Legitimate remote workers connecting from public IPs
  - VPN users with split-tunnel configuration
  - Authorized cloud-based CI/CD runners
soc_ai:
  rule_id: SSH-003
  severity: MEDIUM
  source_types:
    - ssh
