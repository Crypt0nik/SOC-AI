title: Brute Force SSH
id: ssh-001-sigma
status: stable
description: >
  Detects SSH brute force attacks — more than 5 consecutive failed
  authentication attempts from the same source IP within 60 seconds.
  Aligns with MITRE ATT&CK T1110.001 (Brute Force: Password Guessing).
author: SOC-AI
date: 2026/06/29
logsource:
  category: authentication
  product: linux
detection:
  selection:
    action: ssh_failed_auth
  condition: selection
level: high
falsepositives:
  - Administrator typos during legitimate SSH sessions
  - Misconfigured automation scripts
soc_ai:
  rule_id: SSH-001
  severity: HIGH
  source_types:
    - ssh
  aggregation:
    count_by: source_ip
    timeframe_seconds: 60
    threshold: 5
