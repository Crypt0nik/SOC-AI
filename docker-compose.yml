# SOC-AI v1.0 — Community Edition
# Start: docker compose up
# All env vars can be overridden via a .env file (copy .env.example → .env).

x-common-env: &common-env
  DB_PATH: ${DB_PATH:-/data/soc.db}
  POLL_INTERVAL: ${POLL_INTERVAL:-2}
  LOG_DIR: ${LOG_DIR:-/logs}
  RETENTION_DAYS: ${RETENTION_DAYS:-90}

networks:
  soc_net:
    driver: bridge

services:
  # ── Parser — log ingestion ──────────────────────────────────
  parser:
    build:
      context: .
      dockerfile: parser/Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ./sample_logs:/logs
      - db_data:/data
    networks:
      - soc_net
    restart: unless-stopped
    depends_on: []
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3, os; sqlite3.connect(os.environ['DB_PATH']).execute('SELECT 1')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Engine — Sigma detection ────────────────────────────────
  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    environment:
      <<: *common-env
    volumes:
      - db_data:/data
    networks:
      - soc_net
    restart: unless-stopped
    depends_on:
      - parser

  # ── LLM Agent — triage ─────────────────────────────────────
  llm_agent:
    build:
      context: .
      dockerfile: llm_agent/Dockerfile
    environment:
      <<: *common-env
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.4-mini}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      ANONYMIZE_PII: ${ANONYMIZE_PII:-true}
    volumes:
      - db_data:/data
    networks:
      - soc_net
    restart: unless-stopped
    depends_on:
      - engine

  # ── API — FastAPI backend ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *common-env
    volumes:
      - db_data:/data
    networks:
      - soc_net
    restart: unless-stopped
    depends_on:
      - llm_agent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Dashboard — React frontend ──────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    networks:
      - soc_net
    restart: unless-stopped
    depends_on:
      - api

  # ── Ollama — optional local LLM (offline mode) ─────────────
  # To enable: set LLM_BACKEND=ollama in .env
  # First run pulls the model (~4GB for llama3.1:8b).
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - type: volume
        source: ollama_data
        target: /root/.ollama
    networks:
      - soc_net
    restart: unless-stopped
    profiles:
      - ollama  # start with: docker compose --profile ollama up

volumes:
  db_data:      # persists SQLite across restarts
  ollama_data:  # Ollama model cache (only used with --profile ollama)
